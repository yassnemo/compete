# ============================================================
# Competitor tracking configuration (config-driven pipeline).
# Add competitors and the public URLs to track. No code changes needed.
#
# source_type drives which collector is used:
#   static   -> httpx + selectolax + trafilatura (server-rendered pages)
#   dynamic  -> Playwright (JS-heavy pages)
#   rss      -> feedparser (blog/news feeds)
#   jobs     -> jobs collector (careers pages / boards)
# ============================================================

defaults:
  throttle_seconds: 2.0
  respect_robots: true

competitors:
  - id: anthropic
    name: Anthropic
    domain: anthropic.com
    industry: AI / LLM
    tier: 1
    tracked_urls:
      - url: https://www.anthropic.com/news
        source_type: static
        signal_hint: press_release
      - url: https://www.anthropic.com/pricing
        source_type: static
        signal_hint: pricing_change
      - url: https://boards.greenhouse.io/anthropic
        source_type: jobs
        signal_hint: job_posting

  - id: huggingface
    name: Hugging Face
    domain: huggingface.co
    industry: AI / ML platform
    tier: 1
    tracked_urls:
      - url: https://huggingface.co/blog/feed.xml
        source_type: rss
        signal_hint: blog_post

  - id: mistral
    name: Mistral AI
    domain: mistral.ai
    industry: AI / LLM
    tier: 2
    tracked_urls:
      - url: https://mistral.ai/news
        source_type: dynamic
        signal_hint: product_launch
